services:
  android-build:
    build:
      context: .
      dockerfile: Dockerfile.ci
      platforms:
        - linux/arm64
    image: localhost:5000/arcana/android-app:${VERSION:-1.0.0}
    volumes:
      - gradle-cache:/root/.gradle
    command: ./gradlew assembleDebug --no-daemon

  android-test:
    image: localhost:5000/arcana/android-app:${VERSION:-1.0.0}
    volumes:
      - .:/project
      - gradle-cache:/root/.gradle
    command: >
      bash -c "./gradlew testDebugUnitTest --no-daemon --continue;
               ./gradlew createDebugUnitTestCoverageReport --no-daemon || true"

  # fastlane ci: lint + unit tests via fastlane
  android-fastlane:
    image: localhost:5000/arcana/android-app:${VERSION:-1.0.0}
    volumes:
      - gradle-cache:/root/.gradle
    command: bundle exec fastlane ci

  # fastlane bundle_release: signed release AAB for Play Store.
  #
  # NO workspace/keystore bind mount. This compose runs against the HOST docker
  # daemon (socket mount in the jenkins container), so any bind-mount source
  # path resolves on the host — `- .:/project` shadowed the baked Gemfile/gems
  # ("Could not locate Gemfile", #42/#43/#49) and `- ./keystore.jks:...`
  # resolved to a path the host couldn't see ("not a directory", #50). The
  # image already bakes the source + Gemfile + `bundle install` at /project.
  # The keystore is injected as base64 (KEYSTORE_B64) and decoded in-place.
  # Jenkins pulls the signed AAB back out with `docker cp` (no path mount).
  # Validated on bluesea 2026-05-27: BUILD SUCCESSFUL, signReleaseBundle OK.
  android-aab:
    image: localhost:5000/arcana/android-app:${VERSION:-1.0.0}
    volumes:
      - gradle-cache:/root/.gradle
    environment:
      - KEYSTORE_B64=${KEYSTORE_B64}
      - KEY_ALIAS=${KEY_ALIAS}
      - KEY_PASSWORD=${KEY_PASSWORD}
      - STORE_PASSWORD=${STORE_PASSWORD}
    command: >
      bash -c "echo \"$$KEYSTORE_B64\" | base64 -d > /project/keystore.jks &&
               KEYSTORE_FILE=/project/keystore.jks bundle exec fastlane bundle_release"

  # fastlane build_release: signed release APK. Same env-b64 keystore design as
  # android-aab (see note there) — no workspace/keystore bind mount.
  android-release:
    image: localhost:5000/arcana/android-app:${VERSION:-1.0.0}
    volumes:
      - gradle-cache:/root/.gradle
    environment:
      - KEYSTORE_B64=${KEYSTORE_B64}
      - KEY_ALIAS=${KEY_ALIAS}
      - KEY_PASSWORD=${KEY_PASSWORD}
      - STORE_PASSWORD=${STORE_PASSWORD}
    command: >
      bash -c "echo \"$$KEYSTORE_B64\" | base64 -d > /project/keystore.jks &&
               KEYSTORE_FILE=/project/keystore.jks bundle exec fastlane build_release"

volumes:
  gradle-cache:
    # Per-job volume (auto-named <project>_gradle-cache).
    # Reverted from external shared volume — that triggered persistent
    # journal-1 lock contention inside the container that no
    # gradle.properties knob could resolve. Accept the cold-build cost
    # for now; revisit when we understand the race.
