services:
  android-build:
    build:
      context: .
      dockerfile: Dockerfile.ci
      platforms:
        - linux/amd64
    image: localhost:5000/arcana/android-app:${VERSION:-1.0.0}
    platform: linux/amd64
    volumes:
      - .:/project
      - gradle-cache:/root/.gradle
    command: ./gradlew assembleDebug --no-daemon

  android-test:
    build:
      context: .
      dockerfile: Dockerfile.ci
      platforms:
        - linux/amd64
    image: localhost:5000/arcana/android-app:${VERSION:-1.0.0}
    platform: linux/amd64
    volumes:
      - .:/project
      - gradle-cache:/root/.gradle
    command: >
      bash -c "./gradlew testDebugUnitTest --no-daemon --continue;
               ./gradlew createDebugUnitTestCoverageReport --no-daemon || true"

volumes:
  gradle-cache:
