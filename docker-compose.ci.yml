services:
  android-build:
    build:
      context: .
      dockerfile: Dockerfile.ci
      platforms:
        - linux/amd64
    image: localhost:5000/arcana/android-app:${VERSION:-1.0.0}
    platform: linux/amd64
    volumes:
      - gradle-cache:/root/.gradle
    command: ./gradlew assembleDebug --no-daemon

  android-test:
    image: localhost:5000/arcana/android-app:${VERSION:-1.0.0}
    platform: linux/amd64
    volumes:
      - .:/project
      - gradle-cache:/root/.gradle
    command: >
      bash -c "./gradlew testDebugUnitTest --no-daemon --continue;
               ./gradlew createDebugUnitTestCoverageReport --no-daemon || true"

  # fastlane ci: lint + unit tests via fastlane
  android-fastlane:
    image: localhost:5000/arcana/android-app:${VERSION:-1.0.0}
    platform: linux/amd64
    volumes:
      - gradle-cache:/root/.gradle
    command: bundle exec fastlane ci

  # fastlane bundle_release: signed release AAB for Play Store
  # Mounts the workspace at /project so KEYSTORE_FILE=/project/keystore.jks
  # (Jenkins copies the android-keystore credential there) + the Gemfile
  # resolve. Without the .:/project mount the service can't find either,
  # which is why the old raw `docker run ... bash -c 'cd /project && ...'`
  # approach failed with "Could not locate Gemfile" (#42/#43).
  android-aab:
    image: localhost:5000/arcana/android-app:${VERSION:-1.0.0}
    platform: linux/amd64
    volumes:
      - .:/project
      - gradle-cache:/root/.gradle
    environment:
      - KEYSTORE_FILE=/project/keystore.jks
      - KEY_ALIAS=${KEY_ALIAS}
      - KEY_PASSWORD=${KEY_PASSWORD}
      - STORE_PASSWORD=${STORE_PASSWORD}
    command: bundle exec fastlane bundle_release

  # fastlane build_release: signed release APK (keystore injected by Jenkins)
  android-release:
    image: localhost:5000/arcana/android-app:${VERSION:-1.0.0}
    platform: linux/amd64
    volumes:
      - .:/project
      - gradle-cache:/root/.gradle
    environment:
      - KEYSTORE_FILE=/project/keystore.jks
      - KEY_ALIAS=${KEY_ALIAS}
      - KEY_PASSWORD=${KEY_PASSWORD}
      - STORE_PASSWORD=${STORE_PASSWORD}
    command: bundle exec fastlane build_release

volumes:
  gradle-cache:
    # Per-job volume (auto-named <project>_gradle-cache).
    # Reverted from external shared volume — that triggered persistent
    # journal-1 lock contention inside the container that no
    # gradle.properties knob could resolve. Accept the cold-build cost
    # for now; revisit when we understand the race.
