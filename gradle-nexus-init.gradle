// DEPRECATED — kept as a no-op file to maintain Dockerfile.ci's COPY line.
//
// The init-script approach was rejected by Gradle 8+ when settings.gradle.kts
// uses `RepositoriesMode.FAIL_ON_PROJECT_REPOS` (which this project does).
// Init scripts cannot inject settings-level repos, and project-level repo
// additions are forbidden by FAIL_ON_PROJECT_REPOS.
//
// Nexus injection now happens directly in settings.gradle.kts via env var
// `NEXUS_URL` (set null/missing = local dev with public repos; set = CI with
// Nexus proxies prepended before the public repos).
//
// This file intentionally contains no executable code.
